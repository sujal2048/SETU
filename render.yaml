services:
  - type: web
    name: setu-payment-reconciliation
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "./start.sh"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: setu-db
          property: connectionString

databases:
  - name: setu-db
    databaseName: setu
    user: setu_user
